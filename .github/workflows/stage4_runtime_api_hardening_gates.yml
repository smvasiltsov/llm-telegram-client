name: stage4_runtime_api_hardening_gates

on:
  pull_request:
    branches: ["**"]
  push:
    branches: ["main", "master"]

jobs:
  stage4_runtime_api_hardening_gates:
    name: stage4_runtime_api_hardening_gates
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Stage 4 runtime/api hardening gates
        run: ./scripts/stage4_runtime_api_hardening_gates.sh
