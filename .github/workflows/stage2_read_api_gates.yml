name: stage2_read_api_gates

on:
  pull_request:
    branches: ["**"]
  push:
    branches: ["main", "master"]

jobs:
  stage2_read_api_gates:
    name: stage2_read_api_gates
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Stage 2 v1 gates
        run: ./scripts/stage2_read_api_gates.sh
